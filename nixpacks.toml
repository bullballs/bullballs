# Railway / Nixpacks — API-only deploy (no Vite frontend build)
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
onlyIncludeFiles = ["server/package.json", "server/package-lock.json"]
cmds = ["cd server && npm ci --omit=dev"]

[phases.build]
cmds = ["echo 'API service — skipping frontend build'"]

[start]
cmd = "node server/index.js"
