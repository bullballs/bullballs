# Railway / Nixpacks — API-only deploy (no Vite frontend build)
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# Ensure lockfile is present before install (fixes npm ci cache layer errors)
onlyIncludeFiles = ["package.json", "package-lock.json"]
cmds = ["npm ci --omit=dev"]

[phases.build]
cmds = ["echo 'API service — skipping frontend build'"]

[start]
cmd = "node server/index.js"
